<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTrace - Architectural Hardware & Execution Trace Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div id="app" class="app-layout">
    <!-- Collapsible Permanent Left Navigation Sidebar -->
    <aside id="sidebar" class="sidebar"></aside>

    <!-- Main Workspace Area -->
    <div class="app-main">
      <header id="main-header"></header>

      <main id="main-container" class="main-container">
        <div id="view-content" class="view-content"></div>
      </main>

      <footer id="main-statusbar"></footer>
    </div>

    <!-- Log Drawer / Modal -->
    <div id="log-modal" class="modal hidden">
      <div class="modal-overlay" id="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>gem5 Trace Terminal - Execution Stream</span>
          </div>
          <div class="modal-actions">
            <button id="modal-clear-btn" class="btn-icon" title="Clear Terminal">Clear</button>
            <button id="modal-close-btn" class="btn-icon" title="Close Modal">&times;</button>
          </div>
        </div>
        <div class="modal-body">
          <div id="terminal-output" class="terminal-output"></div>
        </div>
        <div class="modal-footer">
          <span id="log-line-count">Showing 100 trace records</span>
          <span class="mono-dim">Filter: IntAlu | MemRead | MemWrite | Branch</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
