# Centralized logging configuration for gtrace-benchmark

root_level: "INFO"

console:
  enabled: true
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  datefmt: "%H:%M:%S"
  colored: true

file:
  enabled: true
  path: "logs/gtrace.log"
  level: "DEBUG"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  rotation:
    enabled: true
    max_bytes: 10485760 # 10 MB
    backup_count: 5

loggers:
  gtrace.scheduler: "INFO"
  gtrace.gem5: "DEBUG"
  gtrace.validator: "DEBUG"
  gtrace.metadata: "INFO"
  gtrace.parser: "INFO"
