# gem5 Simulator execution configuration

gem5:
  # The path to the gem5 executable.
  executable: "/run/media/vedha/E/gem5/build/RISCV/gem5.opt"
  
  # The path to the python configuration script to run under gem5.
  config_script: "/run/media/vedha/E/gtrace/workloadCollector/config/se.py"

trace:
  enabled: true
  debug_flags: "Exec,ExecAll"
  debug_file: "trace.log"
  use_debug_start: false
  debug_start_tick: 0

debug:
  # Extra gem5 command line flags to append (e.g., --verbose or --debug-flags=X)
  extra_flags: []

limits:
  max_instructions: 1000000  # Default instruction limit per simulation to prevent infinite loops (0 for unlimited)
  max_ticks: 0               # Default simulation tick limit (0 for unlimited)
  default_timeout_seconds: 1800

retry:
  max_attempts: 2
  backoff_seconds: 5.0
  backoff_multiplier: 2.0
  retry_on:
    - "timeout"
    - "nonzero_exit"
    - "missing_output"
